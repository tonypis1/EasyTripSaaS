# CI unificato per easytrip-saas: qualità statica, unit, coverage, integrazione DB, Playwright smoke.
# La build di produzione (`npm run build`) resta su Vercel con env complete (Clerk in prerender).
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: easytrip-saas

jobs:
  static-and-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: easytrip-saas/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Validate Node/npm environment
        run: |
          node -v
          npm -v

      - name: Dependency audit (production)
        run: npm audit --omit=dev --audit-level=critical

      - name: Prettier (check)
        run: npm run format:check

      - name: ESLint
        run: npm run lint

      - name: TypeScript
        run: npm run typecheck

      - name: Unit tests
        run: npm run test:unit

      - name: Unit tests + coverage (soglie aree critiche)
        run: npm run test:coverage

  integration:
    runs-on: ubuntu-latest
    needs: static-and-unit
    services:
      postgres:
        image: postgres:16-alpine
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: easytrip_test
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/easytrip_test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: easytrip-saas/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Verify DATABASE_URL for integration
        run: |
          if [ -z "${DATABASE_URL}" ]; then
            echo "::error::DATABASE_URL is not set for integration tests"
            exit 1
          fi
          echo "DATABASE_URL is set (value hidden)"

      - name: Prisma schema su DB di test
        run: npx prisma db push --skip-generate

      - name: Integration tests
        run: npm run test:integration

  playwright-smoke:
    runs-on: ubuntu-latest
    needs: integration
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: easytrip-saas/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright (Chromium)
        run: npx playwright install chromium

      - name: Smoke E2E (@smoke, chromium)
        run: npm run test:e2e:smoke -- --project chromium
        env:
          CI: true
