# Pipeline QA: lint → unit+coverage → integrazione DB → Playwright smoke (@smoke).
# Preview E2E: eseguire manualmente con workflow_dispatch quando E2E_BASE_URL è disponibile.
name: QA

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

defaults:
  run:
    working-directory: easytrip-saas

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: easytrip-saas/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: ESLint
        run: npm run lint

  unit-coverage:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: easytrip-saas/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Unit tests + coverage (soglie aree critiche)
        run: npm run test:coverage

  integration:
    runs-on: ubuntu-latest
    needs: unit-coverage
    services:
      postgres:
        image: postgres:16-alpine
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: easytrip_test
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/easytrip_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: easytrip-saas/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Prisma schema su DB di test
        run: npx prisma db push --skip-generate
      - name: Integration tests
        run: npm run test:integration

  playwright-smoke:
    runs-on: ubuntu-latest
    needs: integration
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: easytrip-saas/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright (Chromium)
        run: npx playwright install chromium
      - name: Smoke E2E (@smoke, chromium)
        run: npm run test:e2e:smoke -- --project chromium
        env:
          CI: true

  playwright-preview:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    needs: integration
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: easytrip-saas/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright (Chromium)
        run: npx playwright install chromium
      - name: E2E Preview (configura E2E_BASE_URL nei secrets del workflow)
        run: npm run test:e2e:preview -- --project chromium
        env:
          E2E_BASE_URL: ${{ secrets.E2E_BASE_URL }}
          E2E_AUTH_STORAGE_STATE: ${{ secrets.E2E_AUTH_STORAGE_STATE }}
          E2E_TRIP_ID: ${{ secrets.E2E_TRIP_ID }}
