# E2E contro l'URL reale del deploy Vercel Preview (dopo deployment success).
# Richiede integrazione GitHub ↔ Vercel con "Deployment Status" abilitato.
# Se l'environment name in Vercel differisce da "Preview", aggiorna la condizione `if` sotto.
name: E2E Preview (Vercel)

on:
  deployment_status:

permissions:
  contents: read
  deployments: read

jobs:
  e2e-preview:
    if: |
      github.event.deployment_status.state == 'success' &&
      github.event.deployment_status.target_url != '' &&
      (github.event.deployment.environment == 'Preview' ||
       github.event.deployment.environment == 'preview')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: easytrip-saas
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: easytrip-saas/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright (Chromium)
        run: npx playwright install chromium

      - name: Smoke E2E against Preview URL
        run: npm run test:e2e:smoke -- --project chromium
        env:
          E2E_BASE_URL: ${{ github.event.deployment_status.target_url }}
          PLAYWRIGHT_SKIP_WEBSERVER: "true"
          CI: true
